# ansible-playbook -i localhost, -e instances=['mongodb', 'catalogue', 'redis', 'user', 'card', 'shipping', 'payment', 'frontend','rabbitmq', 'mysql', 'frontend'] roboshop.yaml

- name: create ec2 and r53 records
  hosts: all
  connection: local
  vars:
    sg_id: sg-0388ffe3cc4a4c0ed
    ami_id: ami-0220d79f3f480ecf5
    domain_name: daws88.sbs
    env: dev
    action: create
    instances:
    - mongodb
    - catalogue
  ## create the ec2 instance and r53 records ##
  tasks:
  - name: creae ec2 instance
    amazon.aws.ec2_instance:
      instance_type: "t3.micro"
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
      name: "{{item}}-{{ env }}"
      tags:
        Project: roboshop
        Component: "{{item}}"
        Environment: "{{env}}"
        Name: "{{item}}-{{env}}"
    loop: "{{instances}}"
    register: ec2_output
    when: action == "create"


  - name: print the output
    ansible.builtin.debug:
      msg: "{{ec2_output}}"

  - name: create r53 records
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "{{item.item}}-{{env}}.{{ domain_name }}" #mongodb-dev.daws88.sbs , 
      type: A
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}"
      wait: false
      overwrite: true
    loop: "{{ec2_output.results}}"
    when: action == "create"

    
  - name: create r53 records
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "roboshop-{{env}}.{{ domain_name }}" #roboshop-dev.daws88.sbs , 
      type: A
      ttl: 1
      value: "{{ item.instances[0].public_ip_address }}"
      wait: false
      overwrite: true
    loop: "{{ec2_output.results}}" 
    when: #and
    - item.item == "frontend"   
    - action == "create"
  ## destroy the ec2 and r53 records##
  - name: delete r53 records
    amazon.aws.route53:
      state: absent
      zone: "{{ domain_name }}"
      record: "{{item}}-{{env}}.{{ domain_name }}" #roboshop-dev.daws88.sbs ,
      type: A
      ttl: 1
    loop: "{{instances}}"
    when: action == "destroy"

  - name: delete ec2 instance
    amazon.aws.ec2_instance:
      state: absent
      name: "{{item}}-{{ env }}"
      wait: false
    loop: "{{instances}}"
    when: action == "destroy"  
    # - name: delete ec2 instance
    #   amazon